name: validate

on:
  push:
  pull_request:

jobs:
  validate-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate skill rules
        run: python3 scripts/validate_skill.py
